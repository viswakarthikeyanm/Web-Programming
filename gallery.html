<html>
<head>
  <title>Gallery — WanderBlog</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 40px 60px 60px;
    }
    .gallery-grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .gallery-grid img:hover {
      opacity: 0.85;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal-overlay img {
      max-width: 80%;
      max-height: 80vh;
      border-radius: 10px;
    }
    .modal-close {
      position: absolute;
      top: 20px; right: 30px;
      font-size: 32px;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">🌍 WanderBlog</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="destinations.html">Destinations</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
<div class="page-header">
  <h1>Travel Gallery</h1>
  <p>A visual journey through our favourite places</p>
</div>
<div class="gallery-grid">
  <img src="images/bali.jpg" alt="Bali" onclick="openModal(this.src)">
  <img src="images/kyoto.jpg" alt="Kyoto" onclick="openModal(this.src)">
  <img src="images/paris.jpg" alt="Paris" onclick="openModal(this.src)">
  <img src="images/santorini.jpg" alt="Santorini" onclick="openModal(this.src)">
  <img src="images/patagonia.jpg" alt="Patagonia" onclick="openModal(this.src)">
  <img src="images/machu-picchu.jpg" alt="Machu Picchu" onclick="openModal(this.src)">
  <img src="images/hero.jpg" alt="Travel" onclick="openModal(this.src)">
  <img src="images/kyoto.jpg" alt="Kyoto 2" onclick="openModal(this.src)">
  <img src="images/bali.jpg" alt="Bali 2" onclick="openModal(this.src)">
</div>
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <span class="modal-close">&times;</span>
  <img id="modal-img" src="" alt="Large view">
</div>
<footer>
  <p>Follow us: <a href="#">Instagram</a> <a href="#">Twitter</a> <a href="#">YouTube</a></p>
  <p style="margin-top:8px;">© 2025 WanderBlog. All rights reserved.</p>
</footer>
<script>
function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
</script>
</body>
</html>
